<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Book Registration</h1>

<form th:action="@{/save}" th:object="${book}" method="post" enctype="multipart/form-data">

    <div>
        <label>Book Title:</label>
        <input type="text" th:field="*{title}" />
        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color:red;"></p>
    </div>

    <div>
        <label>Cover Image (File Upload):</label>
        <input type="file" name="coverImage" />
    </div>

    <button type="submit">Submit</button>
</form>

<img th:src="@{/images/logo.png}" width="100" alt="Logo">
</body>
</html>
